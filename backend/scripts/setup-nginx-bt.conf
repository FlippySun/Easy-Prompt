# 宝塔面板 Nginx 配置模板
# 文件位置: /www/server/panel/vhost/nginx/api.zhiz.chat.conf
# 用途: api.zhiz.chat 反向代理配置
# 2026-04-08 新增 — Phase2 部署

server {
    listen 80;
    listen 443 ssl http2;
    server_name api.zhiz.chat;

    # SSL 证书配置（宝塔自动管理）
    ssl_certificate /www/server/panel/vhost/cert/api.zhiz.chat/fullchain.pem;
    ssl_certificate_key /www/server/panel/vhost/cert/api.zhiz.chat/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # 日志
    access_log /www/wwwlogs/api.zhiz.chat.access.log;
    error_log /www/wwwlogs/api.zhiz.chat.error.log;

    # 反向代理到后端服务
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # WebSocket 支持（为 SSE 预留）
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 请求体大小限制
        client_max_body_size 10m;

        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss;
}

