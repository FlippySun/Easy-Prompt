# ═══════════════════════════════════════════════════════════════
# Easy Prompt Backend — Nginx 反向代理配置模板
# 2026-04-08 新增 — P2.16
#
# 设计思路：
#   Nginx 作为前端反向代理，将 api.zhiz.chat 的请求转发到本地 Node.js 后端（默认 :3000）。
#   包含 SSL/TLS、CORS 预检、速率限制、安全头、WebSocket 升级、日志等生产级配置。
#
# 使用方式：
#   1. 将本文件复制到 /etc/nginx/sites-available/api.zhiz.chat
#   2. ln -s /etc/nginx/sites-available/api.zhiz.chat /etc/nginx/sites-enabled/
#   3. 替换 ssl_certificate / ssl_certificate_key 为实际证书路径
#   4. nginx -t && systemctl reload nginx
#
# 影响范围：api.zhiz.chat 域名的全部流量
# 潜在风险：证书路径错误会导致 Nginx 启动失败；upstream 不可达时返回 502
# ═══════════════════════════════════════════════════════════════

# ── 速率限制区（共享内存 10MB，约 16 万个 IP） ──
limit_req_zone $binary_remote_addr zone=api_global:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=api_ai:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=api_auth:10m rate=3r/s;

# ── Upstream ──
upstream ep_backend {
    server 127.0.0.1:3000;
    keepalive 32;
}

# ── HTTP → HTTPS 重定向 ──
server {
    listen 80;
    listen [::]:80;
    server_name api.zhiz.chat;

    # ACME challenge（Let's Encrypt 续期用）
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS 主配置 ──
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.zhiz.chat;

    # ═══ SSL/TLS ═══
    # TODO: 替换为实际证书路径（Let's Encrypt / 宝塔面板 / 自签证书）
    ssl_certificate     /etc/letsencrypt/live/api.zhiz.chat/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.zhiz.chat/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 1.1.1.1 valid=300s;
    resolver_timeout 5s;

    # ═══ 安全头 ═══
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ═══ 请求体限制 ═══
    client_max_body_size 2m;
    client_body_timeout 30s;
    client_header_timeout 15s;

    # ═══ 日志 ═══
    access_log /var/log/nginx/api.zhiz.chat.access.log;
    error_log  /var/log/nginx/api.zhiz.chat.error.log warn;

    # ═══ 通用代理头（所有 location 继承） ═══
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-Id $request_id;
    proxy_set_header Connection "";

    # 超时配置
    proxy_connect_timeout 10s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;

    # ═══ 健康检查（无限流） ═══
    location = /health {
        proxy_pass http://ep_backend;
    }

    # ═══ AI 增强接口（严格限流） ═══
    location /api/v1/ai/ {
        limit_req zone=api_ai burst=10 nodelay;
        limit_req_status 429;

        # AI 增强可能耗时较长
        proxy_read_timeout 120s;

        proxy_pass http://ep_backend;
    }

    # ═══ 认证接口（中等限流） ═══
    location /api/v1/auth/ {
        limit_req zone=api_auth burst=5 nodelay;
        limit_req_status 429;

        proxy_pass http://ep_backend;
    }

    # ═══ 管理接口（仅内网或授权访问） ═══
    location /api/v1/admin/ {
        # 可选：限制来源 IP（取消注释以启用）
        # allow 127.0.0.1;
        # allow 10.0.0.0/8;
        # deny all;

        limit_req zone=api_global burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://ep_backend;
    }

    # ═══ 其他 API 路由（全局限流） ═══
    location /api/ {
        limit_req zone=api_global burst=30 nodelay;
        limit_req_status 429;

        proxy_pass http://ep_backend;
    }

    # ═══ 拒绝非 API 路径 ═══
    location / {
        return 404 '{"success":false,"error":{"code":"RESOURCE_NOT_FOUND","message":"Not an API endpoint"}}';
        add_header Content-Type application/json always;
    }

    # ═══ 禁止访问隐藏文件 ═══
    location ~ /\. {
        deny all;
        return 404;
    }
}
