<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Easy Prompt — 登录回调</title>
    <!-- ========================== 变更记录 ========================== -->
    <!-- [日期]     2026-04-10 -->
    <!-- [类型]     新增功能 -->
    <!-- [描述]     SSO Plan v2 B1: Safari/fallback Tab redirect 回调页面 -->
    <!-- [思路]     Safari 不支持 chrome.identity.launchWebAuthFlow，-->
    <!--           登录后 zhiz.chat redirect 到此页面，由脚本完成 code 换 token 流程 -->
    <!-- [影响范围] browser/wxt-entrypoints/auth-callback/（新建目录） -->
    <!-- [潜在风险] 无已知风险（仅用于 Safari fallback，Chrome/Firefox 也可作为备用路径） -->
    <!-- ============================================================== -->
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #0f0f14;
        color: #e4e4e7;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 24px;
      }
      .card {
        background: #1a1a24;
        border: 1px solid #2a2a3a;
        border-radius: 16px;
        padding: 40px;
        max-width: 420px;
        width: 100%;
        text-align: center;
      }
      .icon {
        width: 48px;
        height: 48px;
        margin: 0 auto 20px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 24px;
      }
      .icon--loading { background: #1e293b; }
      .icon--success { background: #052e16; }
      .icon--error { background: #450a0a; }
      h2 { font-size: 18px; margin-bottom: 8px; }
      .desc {
        font-size: 14px;
        color: #a1a1aa;
        line-height: 1.6;
        margin-bottom: 20px;
      }
      .btn {
        display: inline-block;
        padding: 10px 24px;
        border-radius: 8px;
        border: none;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        text-decoration: none;
        transition: opacity 0.15s;
      }
      .btn:hover { opacity: 0.85; }
      .btn--primary { background: #6366f1; color: #fff; }
      .btn--secondary { background: #27272a; color: #e4e4e7; }
      .hidden { display: none; }
      @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      .spinner {
        width: 24px; height: 24px;
        border: 2px solid #4b5563;
        border-top-color: #6366f1;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <!-- Loading State -->
      <div id="state-loading">
        <div class="icon icon--loading"><div class="spinner"></div></div>
        <h2>正在完成登录...</h2>
        <p class="desc">请稍候，正在验证授权信息</p>
      </div>

      <!-- Success State -->
      <div id="state-success" class="hidden">
        <div class="icon icon--success">✓</div>
        <h2>登录成功</h2>
        <p class="desc" id="success-msg">您已成功登录 Easy Prompt</p>
        <p class="desc" style="font-size:13px;color:#71717a;">此标签页可以安全关闭</p>
      </div>

      <!-- Error State -->
      <div id="state-error" class="hidden">
        <div class="icon icon--error">✕</div>
        <h2>登录失败</h2>
        <p class="desc" id="error-msg">请重试</p>
        <button class="btn btn--primary" onclick="window.close()">关闭</button>
      </div>
    </div>

    <script type="module" src="./main.js"></script>
  </body>
</html>
